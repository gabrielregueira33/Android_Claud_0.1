<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=5" />
<title>ClaudeMap</title>
<link rel="stylesheet" href="leaflet.css" />
<style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; }
    #map { position: absolute; inset: 0; }
    .panel {
        position: absolute; top: 10px; right: 10px; z-index: 1000;
        background: rgba(20,20,28,0.85); color: #f5f5f5;
        padding: 10px 12px; border-radius: 10px;
        font-size: 13px; line-height: 1.45;
        box-shadow: 0 4px 16px rgba(0,0,0,0.4);
        max-width: 220px;
    }
    .panel h3 { margin: 0 0 6px; font-size: 13px; font-weight: 600; letter-spacing: 0.02em; }
    .panel label { display: block; margin: 4px 0; cursor: pointer; }
    .panel input { vertical-align: middle; margin-right: 6px; }
    .panel button {
        margin-top: 8px; width: 100%; padding: 6px 8px;
        background: #2563eb; color: #fff; border: none; border-radius: 6px;
        font-size: 13px; cursor: pointer;
    }
    .panel button:active { background: #1d4ed8; }
    .status {
        position: absolute; bottom: 12px; left: 12px; z-index: 1000;
        background: rgba(20,20,28,0.85); color: #f5f5f5;
        padding: 6px 10px; border-radius: 6px; font-size: 12px;
    }
    .legend-dot {
        display: inline-block; width: 10px; height: 10px;
        border-radius: 50%; margin-right: 5px; vertical-align: middle;
    }
    .pulse {
        border-radius: 50%;
        box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7);
        animation: pulse 1.6s infinite;
    }
    @keyframes pulse {
        0%   { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
        70%  { box-shadow: 0 0 0 14px rgba(239, 68, 68, 0); }
        100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
</style>
</head>
<body>
<div id="map"></div>
<div class="panel">
    <h3>Live overlays</h3>
    <label><input type="checkbox" id="lyr-cams" checked /><span class="legend-dot" style="background:#06b6d4"></span>Cameras</label>
    <label><input type="checkbox" id="lyr-traffic" checked /><span class="legend-dot" style="background:#f59e0b"></span>Traffic signals</label>
    <label><input type="checkbox" id="lyr-quakes" checked /><span class="legend-dot" style="background:#ef4444"></span>Quakes (24h)</label>
    <label><input type="checkbox" id="lyr-weather" /><span class="legend-dot" style="background:#3b82f6"></span>Precip radar</label>
    <button id="locate">Use my location</button>
</div>
<div class="status" id="status">Ready</div>
<script src="leaflet.js"></script>
<script src="app.js"></script>
</body>
</html>
